<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Submariner - Silver Shimmer Pinstripe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010101;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="watchCanvas"></canvas>

    <script>
        const canvas = document.getElementById('watchCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, radius, dpr;
        
        const colors = {
            steelLight: '#D0D0D0',
            steelMedium: '#888888',
            steelDark: '#222222',
            bezelBg: '#080808',
            dialBg: '#0F0F0F', 
            diamondSparkle: '#F0F9FF',
            whiteText: '#FFFFFF',
            subGrey: '#DDDDDD',
            lume: '#FDFFFF',
            handSilver: '#E8E8E8',
            datePlate: '#FFFFFF' // Changed to pure white for maximum contrast
        };

        function init() {
            resize();
            requestAnimationFrame(animate);
        }

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            
            radius = Math.min(width, height) * 0.38;
        }

        function drawChunkyCase() {
            const cx = width / 2;
            const cy = height / 2;
            const bWidth = radius * 1.05;

            ctx.save();
            const bandGrad = ctx.createLinearGradient(cx - bWidth, 0, cx + bWidth, 0);
            bandGrad.addColorStop(0, '#121212');
            bandGrad.addColorStop(0.2, '#444');
            bandGrad.addColorStop(0.5, '#B0B0B0'); 
            bandGrad.addColorStop(0.8, '#444');
            bandGrad.addColorStop(1, '#121212');

            ctx.fillStyle = bandGrad;
            
            ctx.beginPath();
            ctx.moveTo(cx - bWidth, 0);
            ctx.lineTo(cx + bWidth, 0);
            ctx.lineTo(cx + radius * 0.95, cy - radius);
            ctx.lineTo(cx - radius * 0.95, cy - radius);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(cx - bWidth, height);
            ctx.lineTo(cx + bWidth, height);
            ctx.lineTo(cx + radius * 0.95, cy + radius);
            ctx.lineTo(cx - radius * 0.95, cy + radius);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 1.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawSideDial() {
            const cx = width / 2;
            const cy = height / 2;
            const crownX = cx + radius * 1.2;
            const cw = radius * 0.18;
            const ch = radius * 0.3;

            ctx.fillStyle = '#444';
            ctx.beginPath();
            ctx.ellipse(crownX - 10, cy, radius * 0.15, radius * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            const cGrad = ctx.createLinearGradient(crownX, cy - ch/2, crownX, cy + ch/2);
            cGrad.addColorStop(0, '#111');
            cGrad.addColorStop(0.5, '#AAA');
            cGrad.addColorStop(1, '#111');
            ctx.fillStyle = cGrad;
            ctx.beginPath();
            ctx.roundRect(crownX, cy - ch/2, cw, ch, 4);
            ctx.fill();
        }

        function drawBezel() {
            const cx = width / 2;
            const cy = height / 2;
            const bezelOuter = radius * 1.22;

            const steelGrad = ctx.createRadialGradient(cx, cy, radius * 1.1, cx, cy, bezelOuter);
            steelGrad.addColorStop(0, '#333');
            steelGrad.addColorStop(0.5, '#BBB');
            steelGrad.addColorStop(1, '#333');
            
            ctx.beginPath();
            ctx.arc(cx, cy, bezelOuter, 0, Math.PI * 2);
            ctx.fillStyle = steelGrad;
            ctx.fill();

            const shineGrad = ctx.createConicGradient(Math.PI/6, cx, cy);
            shineGrad.addColorStop(0, '#000');
            shineGrad.addColorStop(0.1, '#1a1a1a'); 
            shineGrad.addColorStop(0.2, '#000');
            shineGrad.addColorStop(0.6, '#000');
            shineGrad.addColorStop(0.7, '#222'); 
            shineGrad.addColorStop(0.8, '#000');
            shineGrad.addColorStop(1, '#000');

            ctx.beginPath();
            ctx.arc(cx, cy, radius * 1.15, 0, Math.PI * 2);
            ctx.fillStyle = shineGrad;
            ctx.fill();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#D0D0D0';
            
            for (let i = 0; i < 60; i++) {
                ctx.save();
                ctx.rotate(i * 6 * Math.PI / 180);
                if (i === 0) {
                    ctx.beginPath();
                    ctx.moveTo(0, -radius * 1.15); 
                    ctx.lineTo(-radius * 0.11, -radius * 0.96); 
                    ctx.lineTo(radius * 0.11, -radius * 0.96);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(0, -radius * 1.04, 6, 0, Math.PI * 2);
                    ctx.fillStyle = colors.lume; ctx.fill();
                } else if (i % 10 === 0) {
                    ctx.font = `bold ${radius * 0.16}px "Helvetica Neue", Arial, sans-serif`;
                    ctx.fillText(i, 0, -radius * 1.06);
                } else if (i % 5 === 0) {
                    ctx.fillRect(-2.5, -radius * 1.12, 5, radius * 0.08);
                }
                ctx.restore();
            }
            ctx.restore();
        }

        function drawDial() {
            const cx = width / 2;
            const cy = height / 2;

            // Rehaut
            const rehautGrad = ctx.createRadialGradient(cx, cy, radius * 0.98, cx, cy, radius);
            rehautGrad.addColorStop(0, '#333');
            rehautGrad.addColorStop(0.5, '#888');
            rehautGrad.addColorStop(1, '#222');
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fillStyle = rehautGrad;
            ctx.fill();

            // Dial Background
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.985, 0, Math.PI * 2);
            ctx.fillStyle = colors.dialBg;
            ctx.fill();

            ctx.save();
            ctx.beginPath();
            ctx.arc(cx, cy, radius * 0.985, 0, Math.PI * 2);
            ctx.clip();

            // --- VERTICAL PIN STRIPES ON FACE ---
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1.8;
            for (let x = cx - radius; x <= cx + radius; x += 12) {
                ctx.beginPath();
                ctx.moveTo(x, cy - radius);
                ctx.lineTo(x, cy + radius);
                ctx.stroke();
            }

            // Texture overlay
            for (let i = 0; i < 800; i++) {
                const rx = (Math.random() - 0.5) * radius * 2;
                const ry = (Math.random() - 0.5) * radius * 2;
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.04})`;
                ctx.fillRect(cx + rx, cy + ry, 1, 1);
            }

            // Vignette
            const dialVignette = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * 0.98);
            dialVignette.addColorStop(0, 'rgba(0,0,0,0)');
            dialVignette.addColorStop(0.6, 'rgba(0,0,0,0.2)');
            dialVignette.addColorStop(1, 'rgba(0,0,0,0.85)');
            ctx.fillStyle = dialVignette;
            ctx.fill();
            ctx.restore();

            // --- TICK MARKS ---
            ctx.save();
            ctx.translate(cx, cy);
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 2.2;
            for (let i = 0; i < 60; i++) {
                ctx.beginPath();
                ctx.moveTo(0, -radius * 0.985);
                ctx.lineTo(0, -radius * 0.985 + (i % 5 === 0 ? 16 : 9));
                ctx.stroke();
                ctx.rotate(Math.PI / 30);
            }
            ctx.restore();

            // --- SILVER SHIMMER BRANDING ---
            const silverGrad = ctx.createLinearGradient(cx - 50, cy - radius * 0.5, cx + 50, cy - radius * 0.3);
            silverGrad.addColorStop(0, '#909090'); 
            silverGrad.addColorStop(0.3, '#E0E0E0'); 
            silverGrad.addColorStop(0.5, '#FFFFFF'); 
            silverGrad.addColorStop(0.7, '#D0D0D0');
            silverGrad.addColorStop(1, '#808080');

            ctx.textAlign = 'center';
            ctx.fillStyle = silverGrad;
            
            // Crown
            ctx.font = `${radius * 0.28}px serif`;
            ctx.fillText("♛", cx, cy - radius * 0.48);
            
            // Rolex
            ctx.font = `bold ${radius * 0.13}px sans-serif`;
            ctx.letterSpacing = "3px";
            ctx.fillText("ROLEX", cx, cy - radius * 0.30);
            
            // Oyster
            ctx.fillStyle = colors.subGrey;
            ctx.letterSpacing = "0px";
            ctx.font = `bold ${radius * 0.04}px sans-serif`;
            ctx.fillText("OYSTER PERPETUAL DATE", cx, cy - radius * 0.21);

            // --- LOWER DIAL TEXT ---
            ctx.fillStyle = colors.subGrey;
            ctx.font = `bold ${radius * 0.075}px sans-serif`;
            ctx.fillText("SUBMARINER", cx, cy + radius * 0.40);
            
            ctx.fillStyle = colors.subGrey;
            ctx.font = `bold ${radius * 0.035}px sans-serif`;
            ctx.fillText("1000ft = 300m", cx, cy + radius * 0.48);
            ctx.fillText("SUPERLATIVE CHRONOMETER", cx, cy + radius * 0.53);
            ctx.fillText("OFFICIALLY CERTIFIED", cx, cy + radius * 0.58);

            // --- HOUR DECALS (Edge Nudged) ---
            const markerScale = 0.85; 
            for (let i = 1; i <= 12; i++) {
                if (i === 3) continue;
                const ang = i * 30 * Math.PI / 180;
                const currentRadius = radius * 0.84;
                const x = Math.sin(ang) * currentRadius;
                const y = -Math.cos(ang) * currentRadius;
                
                ctx.save();
                ctx.translate(cx + x, cy + y);
                ctx.rotate(ang);
                
                // Silver Casing
                ctx.fillStyle = '#A0A0A0';
                ctx.beginPath();
                if (i === 12) {
                    ctx.moveTo(0, radius * 0.12 * markerScale); 
                    ctx.lineTo(-radius * 0.11 * markerScale, -radius * 0.11 * markerScale); 
                    ctx.lineTo(radius * 0.11 * markerScale, -radius * 0.11 * markerScale); 
                } else if (i === 6 || i === 9) {
                    ctx.rect(-radius * 0.05 * markerScale, -radius * 0.1 * markerScale, radius * 0.1 * markerScale, radius * 0.2 * markerScale);
                } else {
                    ctx.arc(0, 0, radius * 0.075 * markerScale, 0, Math.PI * 2);
                }
                ctx.fill();

                // Lume Fill
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, radius * 0.07 * markerScale);
                grad.addColorStop(0, '#FFF');
                grad.addColorStop(0.4, colors.diamondSparkle);
                grad.addColorStop(1, '#BBB');
                ctx.fillStyle = grad;
                
                ctx.beginPath();
                if (i === 12) {
                    ctx.moveTo(0, radius * 0.09 * markerScale); 
                    ctx.lineTo(-radius * 0.08 * markerScale, -radius * 0.08 * markerScale); 
                    ctx.lineTo(radius * 0.08 * markerScale, -radius * 0.08 * markerScale);
                } else if (i === 6 || i === 9) {
                    ctx.rect(-radius * 0.04 * markerScale, -radius * 0.09 * markerScale, radius * 0.08 * markerScale, radius * 0.18 * markerScale);
                } else {
                    ctx.arc(0, 0, radius * 0.065 * markerScale, 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.restore();
            }
        }

        function drawDatePlate() {
            const cx = width / 2;
            const cy = height / 2;
            const datePos = { x: cx + radius * 0.74, y: cy };
            const now = new Date();
            
            // Solid White Plate for maximum contrast
            ctx.fillStyle = '#FFFFFF';
            ctx.beginPath();
            ctx.roundRect(datePos.x - radius * 0.13, datePos.y - radius * 0.09, radius * 0.26, radius * 0.18, 2);
            ctx.fill();
            
            // TRUE BLACK/DARK GREY to ensure visibility
            ctx.fillStyle = '#111111';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `bold ${radius * 0.15}px sans-serif`;
            ctx.fillText(now.getDate(), datePos.x, datePos.y);
        }

        function drawDateLens() {
            const cx = width / 2;
            const cy = height / 2;
            const datePos = { x: cx + radius * 0.74, y: cy };
            const rw = radius * 0.36;
            const rh = radius * 0.28;

            ctx.save();
            // REFINED LENS: Lower opacity in center to avoid washing out the text underneath
            const lensGrad = ctx.createLinearGradient(datePos.x - rw/2, datePos.y - rh/2, datePos.x + rw/2, datePos.y + rh/2);
            lensGrad.addColorStop(0, 'rgba(255,255,255,0.4)');
            lensGrad.addColorStop(0.3, 'rgba(255,255,255,0.05)'); // Very transparent over text
            lensGrad.addColorStop(0.7, 'rgba(255,255,255,0.15)');
            lensGrad.addColorStop(1, 'rgba(255,255,255,0.2)');
            
            ctx.fillStyle = lensGrad;
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 1.2;
            
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 8;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            ctx.beginPath();
            ctx.roundRect(datePos.x - rw/2, datePos.y - rh/2, rw, rh, 14);
            ctx.fill();
            ctx.stroke();
            
            // Thin highlight edge
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.roundRect(datePos.x - rw/2 + 2, datePos.y - rh/2 + 2, rw - 4, rh - 4, 12);
            ctx.stroke();
            ctx.restore();
        }

        function drawHands(type) {
            const now = new Date();
            const ms = now.getMilliseconds(), s = now.getSeconds(), m = now.getMinutes(), h = now.getHours() % 12;
            const cx = width / 2, cy = height / 2;
            const sAng = ((s + ms / 1000) * 6) * Math.PI / 180;
            const mAng = (m * 6 + s * 0.1 + (ms / 1000) * 0.1) * Math.PI / 180;
            const hAng = (h * 30 + m * 0.5 + s * (0.5/60)) * Math.PI / 180;

            const getHandGrad = (len) => {
                const g = ctx.createLinearGradient(0, 0, 0, -len);
                g.addColorStop(0, '#B0B0B0');
                g.addColorStop(0.5, colors.handSilver);
                g.addColorStop(1, '#A0A0A0');
                return g;
            };

            if (type === 'main') {
                // HOUR HAND
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(hAng);
                ctx.fillStyle = getHandGrad(radius * 0.58);
                ctx.strokeStyle = '#2a2a2a';
                ctx.lineWidth = 4.5;
                ctx.beginPath();
                ctx.moveTo(0, 15); ctx.lineTo(-radius * 0.05, -radius * 0.45);
                ctx.lineTo(0, -radius * 0.58); ctx.lineTo(radius * 0.05, -radius * 0.45);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                const circleY = -radius * 0.35;
                const circleR = radius * 0.075;
                ctx.beginPath();
                ctx.arc(0, circleY, circleR, 0, Math.PI * 2); 
                ctx.fill(); ctx.stroke();
                ctx.strokeStyle = '#111';
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(0, circleY); ctx.lineTo(0, circleY - circleR);
                ctx.moveTo(0, circleY); ctx.lineTo(circleR * Math.cos(Math.PI/6), circleY + circleR * Math.sin(Math.PI/6));
                ctx.moveTo(0, circleY); ctx.lineTo(-circleR * Math.cos(Math.PI/6), circleY + circleR * Math.sin(Math.PI/6));
                ctx.stroke();
                ctx.restore();

                // MINUTE HAND
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(mAng);
                ctx.fillStyle = getHandGrad(radius * 0.88);
                ctx.strokeStyle = '#2a2a2a';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(-radius * 0.04, 15); ctx.lineTo(-radius * 0.04, -radius * 0.78);
                ctx.lineTo(0, -radius * 0.88); ctx.lineTo(radius * 0.04, -radius * 0.78);
                ctx.lineTo(radius * 0.04, 15);
                ctx.closePath();
                ctx.fill(); ctx.stroke();
                ctx.restore();
            } else if (type === 'second') {
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(sAng);
                ctx.strokeStyle = colors.handSilver; ctx.lineWidth = 1.3;
                ctx.beginPath();
                ctx.moveTo(0, 25); ctx.lineTo(0, -radius * 0.98);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(0, -radius * 0.74, radius * 0.025, 0, Math.PI * 2);
                ctx.fillStyle = colors.handSilver; ctx.fill(); ctx.stroke();
                ctx.restore();
                ctx.beginPath();
                ctx.arc(cx, cy, 7, 0, Math.PI * 2);
                ctx.fillStyle = '#BBB'; ctx.fill();
                ctx.strokeStyle = '#222'; ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#010101';
            ctx.fillRect(0, 0, width, height);

            drawChunkyCase();
            drawSideDial();
            drawBezel();
            drawDial();
            
            drawDatePlate();
            drawHands('main');
            drawDateLens();
            drawHands('second');

            const globalVignette = ctx.createRadialGradient(width/2, height/2, radius * 0.8, width/2, height/2, width * 0.8);
            globalVignette.addColorStop(0, 'rgba(0,0,0,0)');
            globalVignette.addColorStop(1, 'rgba(0,0,0,0.9)');
            ctx.fillStyle = globalVignette;
            ctx.fillRect(0, 0, width, height);

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.onload = init;
    </script>
</body>
</html>
