<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Timer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
        }
        .timer-button {
            transition: all 0.2s;
        }
        .timer-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .timer-container {
            min-height: 100vh;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center p-4 timer-container">
    <div class="bg-gray-800 p-8 md:p-12 rounded-2xl shadow-lg w-full max-w-2xl text-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-6">Simple Timer</h1>

        <!-- Timer Display -->
        <div id="timer-display" class="text-7xl md:text-9xl font-mono font-bold mb-8 text-yellow-300">00:00</div>

        <!-- Timer Controls -->
        <div class="flex flex-col items-center space-y-4 mb-8">
            <div class="flex flex-wrap justify-center gap-2 md:gap-4">
                <button onclick="setTimer(60)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">1 min</button>
                <button onclick="setTimer(120)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">2 min</button>
                <button onclick="setTimer(300)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">5 min</button>
                <button onclick="setTimer(600)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">10 min</button>
                <button onclick="setTimer(900)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">15 min</button>
                <button onclick="setTimer(1200)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">20 min</button>
                <button onclick="setTimer(1800)" class="timer-button bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl">30 min</button>
            </div>

            <!-- Custom Timer Input -->
            <div class="w-full max-w-xs">
                <label for="custom-minutes" class="sr-only">Custom Minutes</label>
                <div class="flex items-center gap-2 mt-4">
                    <input type="number" id="custom-minutes" placeholder="Enter minutes" class="flex-grow bg-gray-700 border border-gray-600 text-white rounded-xl py-3 px-4 focus:outline-none focus:ring-2 focus:ring-yellow-500 transition-colors duration-200">
                    <button onclick="startCustomTimer()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-xl">Start</button>
                </div>
            </div>
        </div>

        <!-- Start/Stop Buttons -->
        <div class="flex justify-center space-x-4">
            <button id="start-btn" onclick="startTimer()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-10 rounded-xl hidden">Start</button>
            <button id="pause-btn" onclick="pauseTimer()" class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-4 px-10 rounded-xl hidden">Pause</button>
            <button id="reset-btn" onclick="resetTimer()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-xl hidden">Reset</button>
            <button id="resume-btn" onclick="resumeTimer()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-10 rounded-xl hidden">Resume</button>
            <button id="stop-audio-btn" onclick="stopAudio()" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-xl hidden">Stop Alarm</button>
        </div>
    </div>

    <!-- Alert Message Box -->
    <div id="alert-box" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-lg shadow-xl text-center">
            <h3 id="alert-message" class="text-xl md:text-2xl font-semibold mb-4 text-yellow-300"></h3>
            <button onclick="closeAlert()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg">OK</button>
        </div>
    </div>

    <script>
        let countdown;
        let timeLeft;
        let isPaused = false;
        let isRunning = false;
        let audioContext = null;

        const display = document.getElementById('timer-display');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const resumeBtn = document.getElementById('resume-btn');
        const stopAudioBtn = document.getElementById('stop-audio-btn');
        const customMinutesInput = document.getElementById('custom-minutes');
        const alertBox = document.getElementById('alert-box');
        const alertMessage = document.getElementById('alert-message');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const displayMinutes = minutes < 10 ? '0' + minutes : minutes;
            const displaySeconds = seconds < 10 ? '0' + seconds : seconds;
            display.textContent = `${displayMinutes}:${displaySeconds}`;
        }

        function setTimer(minutes) {
            if (isRunning) {
                showAlert("Please reset the current timer first.");
                return;
            }
            timeLeft = minutes;
            updateDisplay();
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            resetBtn.classList.add('hidden');
            resumeBtn.classList.add('hidden');
        }

        function startTimer() {
            if (isRunning) return;
            if (timeLeft === undefined || timeLeft <= 0) {
                showAlert("Please set a time first.");
                return;
            }
            isRunning = true;
            isPaused = false;
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            resetBtn.classList.remove('hidden');
            resumeBtn.classList.add('hidden');

            countdown = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    isRunning = false;
                    showAlert("Timer finished!");
                    playAlarmSound();
                    resetControls();
                    return;
                }
                timeLeft--;
                updateDisplay();
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(countdown);
            isPaused = true;
            pauseBtn.classList.add('hidden');
            resumeBtn.classList.remove('hidden');
        }

        function resumeTimer() {
            if (!isPaused) return;
            isPaused = false;
            startTimer();
            resumeBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
        }

        function resetTimer() {
            clearInterval(countdown);
            timeLeft = undefined;
            isRunning = false;
            isPaused = false;
            stopAudio();
            display.textContent = "00:00";
            resetControls();
        }

        function resetControls() {
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            resetBtn.classList.add('hidden');
            resumeBtn.classList.add('hidden');
        }

        function startCustomTimer() {
            const minutes = parseInt(customMinutesInput.value, 10);
            if (isNaN(minutes) || minutes <= 0) {
                showAlert("Please enter a valid number of minutes.");
                return;
            }
            setTimer(minutes * 60);
            startTimer();
        }

        function showAlert(message) {
            alertMessage.textContent = message;
            alertBox.classList.remove('hidden');
            alertBox.classList.add('flex');
        }

        function closeAlert() {
            alertBox.classList.add('hidden');
            alertBox.classList.remove('flex');
            stopAudio();
        }

        function playAlarmSound() {
            if (audioContext) return; // Prevent multiple alarms

            stopAudioBtn.classList.remove('hidden');
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) {
                console.error("Web Audio API is not supported in this browser.");
                return;
            }

            audioContext = new AudioContext();
            const eb3 = 311.13; // Eb3
            const g3 = 392.00; // G3
            const bb3 = 466.16; // Bb3
            const duration = 0.2; // Note duration in seconds
            const triadInterval = 2.0; // 2 second pause
            const repeat = 15;

            function playNote(frequency, time) {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'sine';
                oscillator.frequency.value = frequency;

                // Simple ADSR envelope
                gainNode.gain.setValueAtTime(0, time);
                gainNode.gain.linearRampToValueAtTime(0.5, time + 0.01);
                gainNode.gain.linearRampToValueAtTime(0, time + duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.start(time);
                oscillator.stop(time + duration);
            }

            let currentTime = audioContext.currentTime;

            for (let i = 0; i < repeat; i++) {
                playNote(eb3, currentTime);
                playNote(g3, currentTime + duration);
                playNote(bb3, currentTime + duration * 2);
                currentTime += (duration * 3) + triadInterval;
            }
        }

        function stopAudio() {
            if (audioContext) {
                audioContext.close().then(() => {
                    audioContext = null;
                });
            }
            stopAudioBtn.classList.add('hidden');
        }
    </script>
</body>
</html>
