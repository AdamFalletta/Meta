<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSN | Pro Baseball Broadcast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --apple-bg: #000000;
            --glass: rgba(28, 28, 30, 0.7);
            --glass-border: rgba(238, 238, 238, 0.1);
            --accent: #007AFF;
            --inning-gold: #facc15;
            --live-red: #bb2124;
            --off-white: #eeeeee;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--apple-bg);
            color: var(--off-white);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            font-size: 20px;
        }

        .broadcast-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 50%, #1c1c1e 0%, #000000 100%);
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
        }

        .main-layout {
            display: flex;
            flex: 1;
            padding: 24px;
            gap: 24px;
            overflow: hidden;
        }

        .video-viewport {
            flex: 1;
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            background: #0a0a0a;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar {
            width: 420px; 
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: all 0.5s ease;
        }

        .sidebar.hidden {
            width: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateX(80px);
        }

        /* Bottom Marquee Styles */
        .bottom-marquee {
            height: 85px;
            margin: 0 24px 24px 24px;
            display: flex;
            align-items: center;
            position: relative;
            transition: all 0.4s ease;
            padding: 0 15px;
        }

        .bottom-marquee.hidden {
            height: 0;
            margin-bottom: 0;
            opacity: 0;
            transform: translateY(30px);
        }

        .logo-section {
            padding: 0 25px;
            font-weight: 900;
            font-size: 2.4rem;
            letter-spacing: -1.5px;
            border-right: 2px solid var(--glass-border);
            color: var(--off-white);
            display: flex;
            align-items: center;
            height: 100%;
        }

        .logo-section span { color: var(--accent); }

        .score-ticker {
            flex: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 20px;
            height: 100%;
            position: relative;
        }

        /* Animation: Clean Fade In/Out for Teams */
        @keyframes fadeInOutOnly {
            0% { opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Animation: Horizontal Slide for Stats */
        @keyframes statSlideIn {
            0% { opacity: 0; transform: translateX(15px); }
            15% { opacity: 1; transform: translateX(0); }
            85% { opacity: 1; transform: translateX(0); }
            100% { opacity: 0; transform: translateX(-15px); }
        }

        .ticker-group {
            position: absolute;
            left: 20px;
            right: 20px;
            display: none;
            width: calc(100% - 40px);
            height: 100%;
            align-items: center;
        }

        .ticker-group.active {
            display: flex;
            animation: fadeInOutOnly 8.5s ease-in-out forwards;
        }

        .fixed-score {
            display: flex;
            align-items: center;
            gap: 24px;
            padding-right: 32px;
            border-right: 1px solid rgba(238,238,238,0.1);
            white-space: nowrap;
        }

        .rotating-stats {
            flex: 1;
            height: 100%;
            position: relative;
            margin-left: 32px;
            display: flex;
            align-items: center;
        }

        .stat-line {
            position: absolute;
            width: 100%;
            display: none;
            align-items: center;
            opacity: 0;
        }

        .stat-line.active {
            display: flex;
            animation: statSlideIn 4s ease-in-out forwards;
        }

        /* Stats font size */
        .stat-label { font-size: 1.35rem; color: #888; font-weight: 800; margin-right: 6px; }
        .stat-val { font-size: 1.35rem; color: var(--off-white); font-weight: 700; margin-right: 24px; }
        .stat-sub { font-size: 1.15rem; color: #888; font-weight: 600; margin-left: 6px; }

        .score-winner { color: var(--inning-gold); }
        .score-neutral { color: var(--off-white); }
        .score-loser { color: var(--off-white); }
        
        .live-badge {
            background: var(--live-red);
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        .clock-display {
            font-size: 1.3rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            opacity: 0.9;
        }

        /* Scoreboard Elements */
        .bases-wrapper { display: flex; justify-content: center; align-items: center; width: 100%; height: 70px; position: relative; }
        .bases-container { position: relative; width: 90px; height: 60px; }
        .base-diamond { position: absolute; width: 32px; height: 32px; border: 2px solid rgba(238,238,238,0.25); transform: rotate(45deg); }
        .base-first { top: 24px; right: 4px; }
        .base-second { top: -1px; left: 50%; transform: translateX(-50%) rotate(45deg); }
        .base-third { top: 24px; left: 4px; }
        .base-occupied { background-color: var(--inning-gold); border-color: var(--inning-gold); box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }

        .pitch-count-badge {
            background-color: #121212 !important;
            padding: 6px 10px;
            border-radius: 4px;
        }

        /* Global Text Utilities */
        .text-xs { font-size: 0.9rem !important; }
        .text-sm { font-size: 1.2rem !important; }
        .text-lg { font-size: 1.6rem !important; }
        .text-xl { font-size: 2.2rem !important; }
        .text-3xl { font-size: 3.5rem !important; } 

        /* Pitch Tracker Specific Styles */
        .strike-zone {
            position: absolute;
            /* Updated to 3:2 ratio: Width is 40%, so Height should be 60% of that proportionally or just visually balanced */
            /* Standard baseball strike zone is vertically rectangular. 
               User requested 3:2 ratio where width is the reference for the height's base. */
            width: 48%;
            height: 52%;
            top: 24%;
            left: 26%;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.02);
            background: rgba(255, 255, 255, 0.03);
        }
        .pitch-dot {
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div class="broadcast-container" id="app">
        <div class="main-layout">
            <div class="video-viewport" id="viewport">
                <!-- Score Bug Overlay -->
                <div class="absolute bottom-8 right-8 flex flex-col items-end gap-3 z-10">
                    <div class="glass px-6 py-5 flex items-center gap-8">
                        <div class="flex flex-col items-center">
                            <div class="text-sm font-black opacity-90 tracking-widest mb-1">NYY</div>
                            <div class="text-3xl font-black leading-none score-neutral">4</div>
                        </div>

                        <div class="flex flex-col items-center min-w-[80px]">
                            <div class="bases-wrapper">
                                <div class="bases-container">
                                    <div class="base-diamond base-second"></div> 
                                    <div class="base-diamond base-third base-occupied"></div> 
                                    <div class="base-diamond base-first"></div> 
                                </div>
                            </div>
                            <div class="flex items-center gap-1.5 mb-2">
                                <i class="fas fa-caret-up text-sm" style="color: var(--inning-gold);"></i>
                                <span class="text-sm font-black leading-none">7</span>
                            </div>
                            <!-- Outs Circles -->
                            <div class="flex gap-3 mb-2">
                                <div class="w-3.5 h-3.5 rounded-full bg-blue-500 shadow-[0_0_10px_rgba(0,122,255,0.8)]"></div>
                                <div class="w-3.5 h-3.5 rounded-full bg-[#eeeeee]/20"></div>
                            </div>
                            <div class="text-xl font-black tracking-widest leading-none">2-1</div>
                        </div>

                        <div class="flex flex-col items-center">
                            <div class="text-sm font-black opacity-90 tracking-widest mb-1">LAD</div>
                            <div class="text-3xl font-black leading-none score-neutral">2</div>
                        </div>
                    </div>
                    
                    <!-- Pitcher Badge -->
                    <div class="glass px-5 py-2 flex items-center justify-between w-full">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-bold uppercase">Ohtani</span>
                            <span class="text-[14px] font-mono opacity-80 font-bold ml-1">(17-5, 2.28)</span>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-mono pitch-count-badge">P: 92</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="glass p-6">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-500 to-purple-500 overflow-hidden">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aaron" alt="Player">
                        </div>
                        <div>
                            <h3 class="font-bold text-lg leading-tight">Aaron Judge</h3>
                            <p class="text-xs opacity-50">NYY | Center Field</p>
                        </div>
                        <div class="ml-auto">
                            <span class="text-sm font-mono text-blue-400">#99</span>
                        </div>
                    </div>
                    
                    <div class="mb-4 py-2 border-y border-[#eeeeee]/5 text-center">
                        <span class="text-xs opacity-50 uppercase tracking-tighter mr-2">At Bat</span>
                        <span class="text-sm font-bold text-blue-400">Today: 0-2 w/ 2 SO's</span>
                    </div>

                    <div class="grid grid-cols-3 gap-3 text-center">
                        <div class="bg-[#eeeeee]/5 p-3 rounded-lg"><div class="text-[10px] opacity-50 uppercase">AVG</div><div class="font-bold text-sm">.284</div></div>
                        <div class="bg-[#eeeeee]/5 p-3 rounded-lg"><div class="text-[10px] opacity-50 uppercase">HR</div><div class="font-bold text-sm">32</div></div>
                        <div class="bg-[#eeeeee]/5 p-3 rounded-lg"><div class="text-[10px] opacity-50 uppercase">RBI</div><div class="font-bold text-sm">84</div></div>
                    </div>
                </div>

                <div class="glass p-6 flex-1 flex flex-col">
                    <h3 class="text-xs font-bold mb-3 uppercase opacity-70">Pitch Tracker</h3>
                    <div class="flex-1 bg-black/20 rounded-xl relative border border-white/5 overflow-hidden">
                        <!-- Strike Zone Box -->
                        <div class="strike-zone"></div>
                        
                        <!-- Added Pitches -->
                        <div class="pitch-dot bg-red-500 shadow-[0_0_8px_red]" style="top:45%; left:52%"></div>
                        <div class="pitch-dot bg-red-500 shadow-[0_0_8px_red]" style="top:55%; left:42%"></div>
                        <div class="pitch-dot bg-red-500 shadow-[0_0_8px_red]" style="top:65%; left:65%"></div>
                        <div class="pitch-dot bg-green-500 shadow-[0_0_8px_green]" style="top:85%; left:48%"></div>
                        <div class="pitch-dot bg-green-500 shadow-[0_0_8px_green]" style="top:30%; left:20%"></div>
                        <div class="pitch-dot bg-red-500 shadow-[0_0_8px_red]" style="top:25%; left:35%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Ticker Marquee -->
        <div class="bottom-marquee glass" id="marquee">
            <div class="logo-section">NSN<span>.</span></div>
            <div class="score-ticker" id="ticker-container"></div>
            <div class="px-8 border-l border-[#eeeeee]/10 flex items-center gap-8">
                <span class="live-badge">Live</span>
                <span id="clock" class="clock-display">12:00 PM</span>
            </div>
        </div>
    </div>

    <script>
        const scores = [
            { 
                home: "NYM", homeScore: 3, away: "ATL", awayScore: 5, status: "FINAL",
                pitching: { W: "Fried", WStats: "(11-7, 3.20)", L: "Manaea", LStats: "(12-6, 3.35)", S: "Iglesias", SStats: "(31, 1.22)" },
                batting: { player: "Ozuna (ATL)", line: "2-4, HR, 3 RBI", season: ".302 AVG, 37 HR" }
            },
            { 
                home: "HOU", homeScore: 1, away: "SEA", awayScore: 0, status: "BOT 4",
                pitching: { SP: "Verlander (HOU)", SPStats: "4.0 IP, 2 K, 0 ER", Opp: "Kirby (SEA)", OppStats: "3.2 IP, 4 K, 1 ER" },
                batting: { player: "Alvarez (HOU)", line: "1-1, BB", season: ".308 AVG, 34 HR" }
            },
            { 
                home: "CHC", homeScore: 8, away: "CIN", awayScore: 7, status: "TOP 9",
                pitching: { SP: "Steele (CHC)", SPStats: "6.1 IP, 8 K, 4 ER", Opp: "Greene (CIN)", OppStats: "5.0 IP, 6 K, 5 ER" },
                batting: { player: "Happ (CHC)", line: "3-5, 2 HR, 5 RBI", season: ".244 AVG, 25 HR" }
            },
            { 
                home: "BOS", homeScore: 4, away: "TOR", awayScore: 1, status: "FINAL",
                pitching: { W: "Houck", WStats: "(14-9, 3.12)", L: "Bassitt", LStats: "(10-14, 4.16)", S: "Jansen", SStats: "(28, 3.45)" },
                batting: { player: "Devers (BOS)", line: "2-3, HR, 2 RBI", season: ".275 AVG, 28 HR" }
            }
        ];

        let currentGroupIndex = 0;

        function initTicker() {
            const container = document.getElementById('ticker-container');
            container.innerHTML = ''; 
            scores.forEach((score, idx) => {
                const group = document.createElement('div');
                group.className = 'ticker-group';
                group.id = `game-${idx}`;

                const awayWinner = score.awayScore > score.homeScore;
                const homeWinner = score.homeScore > score.awayScore;

                const fixedScore = `
                    <div class="fixed-score">
                        <span class="opacity-50 text-base font-bold">${score.status}</span>
                        <span class="font-black text-lg">${score.away}</span>
                        <span class="text-xl font-black ${awayWinner ? 'score-winner' : 'score-loser'}">${score.awayScore}</span>
                        <span class="opacity-20 text-base">@</span>
                        <span class="font-black text-lg">${score.home}</span>
                        <span class="text-xl font-black ${homeWinner ? 'score-winner' : 'score-loser'}">${score.homeScore}</span>
                    </div>
                `;

                let pitchHtml = "";
                if (score.status === 'FINAL') {
                    pitchHtml = `
                        <span class="stat-label">W:</span><span class="stat-val">${score.pitching.W}<span class="stat-sub">${score.pitching.WStats}</span></span>
                        <span class="stat-label">L:</span><span class="stat-val">${score.pitching.L}<span class="stat-sub">${score.pitching.LStats}</span></span>
                        ${score.pitching.S !== 'None' ? `<span class="stat-label">S:</span><span class="stat-val">${score.pitching.S}<span class="stat-sub">${score.pitching.SStats}</span></span>` : ''}
                    `;
                } else {
                    pitchHtml = `
                        <span class="stat-label">P:</span><span class="stat-val">${score.pitching.SP}<span class="stat-sub">${score.pitching.SPStats}</span></span>
                        <span class="stat-label">VS:</span><span class="stat-val">${score.pitching.Opp}<span class="stat-sub">${score.pitching.OppStats}</span></span>
                    `;
                }

                group.innerHTML = `
                    ${fixedScore}
                    <div class="rotating-stats">
                        <div class="stat-line" data-index="0">${pitchHtml}</div>
                        <div class="stat-line" data-index="1">
                            <span class="stat-label">BAT:</span><span class="stat-val">${score.batting.player} ${score.batting.line}</span>
                            <span class="stat-label">SEASON:</span><span class="stat-val opacity-70">${score.batting.season}</span>
                        </div>
                    </div>
                `;
                container.appendChild(group);
            });
            startCycle();
        }

        function startCycle() {
            const groups = document.querySelectorAll('.ticker-group');
            if (groups.length === 0) return;
            
            function showNextGame() {
                groups.forEach(g => {
                    g.classList.remove('active');
                    g.style.display = 'none';
                    g.querySelectorAll('.stat-line').forEach(l => {
                        l.classList.remove('active');
                        l.style.display = 'none';
                    });
                });

                const activeGroup = groups[currentGroupIndex];
                if (!activeGroup) return;

                activeGroup.style.display = 'flex';
                activeGroup.classList.add('active');
                
                const stats = activeGroup.querySelectorAll('.stat-line');
                
                stats[0].style.display = 'flex';
                stats[0].classList.add('active');

                setTimeout(() => {
                    stats[0].classList.remove('active');
                    setTimeout(() => {
                        stats[0].style.display = 'none';
                        stats[1].style.display = 'flex';
                        stats[1].classList.add('active');
                    }, 500); 
                }, 4000);

                setTimeout(() => {
                    currentGroupIndex = (currentGroupIndex + 1) % scores.length;
                    showNextGame();
                }, 8500);
            }
            
            showNextGame();
        }

        function updateClock() {
            const clockEl = document.getElementById('clock');
            if (clockEl) {
                clockEl.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
        }

        window.onload = () => {
            initTicker();
            updateClock();
            setInterval(updateClock, 1000);
        };

        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'h') {
                document.getElementById('sidebar').classList.toggle('hidden');
                document.getElementById('marquee').classList.toggle('hidden');
            }
        });
    </script>
</body>
</html>
