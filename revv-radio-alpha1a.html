<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The RevV - Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Custom Seeker - 100% Reliable Touch */
        #seeker-container {
            width: 100%;
            height: 40px; /* Huge touch target */
            display: flex;
            align-items: center;
            cursor: pointer;
            touch-action: none; 
            position: relative;
        }

        .seeker-track {
            width: 100%;
            height: 4px;
            background: #27272a;
            border-radius: 2px;
            position: relative;
            overflow: visible;
        }

        .seeker-fill {
            position: absolute;
            height: 100%;
            background: #ffffff;
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }

        .seeker-thumb {
            position: absolute;
            top: 50%;
            left: 0%;
            width: 20px;
            height: 20px;
            background: #ffffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            z-index: 60;
        }

        .track-item:nth-child(even) { background-color: #0a0a0a; }
        .active-track { background-color: #001f3f !important; border-left: 4px solid #ffffff; }
        
        /* Fixed Header Styling */
        .header-player {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.98);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #18181b;
            z-index: 100;
        }

        .autoplay-active { color: #ffffff !important; filter: drop-shadow(0 0 8px rgba(255,255,255,0.6)); }

        /* Updated scroll margin to account for header height + new list margin */
        .track-item {
            scroll-margin-top: 220px; 
        }
    </style>
</head>
<body class="bg-black text-white font-sans antialiased overflow-hidden h-screen select-none">

    <div id="app" class="h-full flex flex-col relative max-w-4xl mx-auto">
        
        <!-- FIXED HEADER -->
        <header class="shrink-0 header-player">
            <div class="px-6 pt-6 pb-2 text-center">
                <h1 class="text-3xl font-black tracking-tighter text-white italic uppercase">RevV Radio</h1>
            </div>

            <div class="px-6 pb-6 pt-2 flex flex-col items-center gap-4">
                <!-- Controls -->
                <div class="flex items-center justify-center w-full relative">
                    <div class="flex items-center space-x-10">
                        <button id="btn-prev" class="text-zinc-500 hover:text-white transition active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="m11 19-7-7 7-7v14zm8 0-7-7 7-7v14z"/></svg>
                        </button>
                        
                        <button id="btn-play-pause" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition active:scale-95 shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                            <div id="play-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                            <div id="pause-icon" class="hidden">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            </div>
                        </button>

                        <button id="btn-next" class="text-zinc-500 hover:text-white transition active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="m5 19 7-7-7-7v14zm8 0 7-7-7-7v14z"/></svg>
                        </button>
                    </div>

                    <button id="btn-autoplay" class="absolute right-0 transition-all duration-200 flex items-center group text-zinc-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                    </button>
                </div>

                <!-- Seeker Row -->
                <div class="w-full flex items-center max-w-md">
                    <span id="time-current" class="text-[10px] text-zinc-500 w-12 text-right font-mono pr-2">0:00</span>
                    <div id="seeker-container" class="flex-1 px-2">
                        <div class="seeker-track">
                            <div id="seeker-fill" class="seeker-fill"></div>
                            <div id="seeker-thumb" class="seeker-thumb"></div>
                        </div>
                    </div>
                    <span id="time-total" class="text-[10px] text-zinc-500 w-12 font-mono pl-2">0:00</span>
                </div>
            </div>
        </header>

        <!-- SCROLLABLE LIST -->
        <main id="main-scroll" class="flex-1 overflow-y-auto no-scrollbar">
            <!-- Added 40px top margin (mt-10) to the list container -->
            <div id="track-list" class="mt-10 divide-y divide-zinc-900 border-b border-zinc-900 mb-[100px]">
                <!-- Tracks injected here -->
            </div>
        </main>

        <audio id="main-audio" preload="auto"></audio>
    </div>

    <script>
        const tracks = [
            { id: 0, title: "Voodoo Riff (Draft)", duration: "3:42", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://images.unsplash.com/photo-1514525253361-bee8718a300c?w=200" },
            { id: 1, title: "Crimson Sky", duration: "4:05", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=200" },
            { id: 2, title: "Neon Jungle", duration: "3:18", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=200" },
            { id: 3, title: "Bass Line Idea #4", duration: "2:55", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", cover: "https://images.unsplash.com/photo-1459749411177-042180ce673c?w=200" },
            { id: 4, title: "After Hours", duration: "5:21", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200" },
            { id: 5, title: "Midnight City", duration: "4:12", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-11.mp3", cover: "https://images.unsplash.com/photo-1516280440614-37939bbacd81?w=200" },
            { id: 6, title: "Electric Dreams", duration: "3:45", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-12.mp3", cover: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=200" },
            { id: 7, title: "Velvet Sky", duration: "5:01", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-13.mp3", cover: "https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?w=200" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        let autoplay = true;
        let isDragging = false;

        const audio = document.getElementById('main-audio');
        const container = document.getElementById('seeker-container');
        const fill = document.getElementById('seeker-fill');
        const thumb = document.getElementById('seeker-thumb');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnAutoplay = document.getElementById('btn-autoplay');
        const mainScroll = document.getElementById('main-scroll');

        function init() {
            renderTrackList();
            setupEventListeners();
            updateAutoplayUI();
            selectTrack(0, false);
        }

        function renderTrackList() {
            document.getElementById('track-list').innerHTML = tracks.map((track, index) => `
                <div id="track-item-${index}" onclick="selectTrack(${index}, true)" class="track-item flex items-center p-4 cursor-pointer transition-all">
                    <img src="${track.cover}" class="w-12 h-12 rounded object-cover mr-4 border border-white/5">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-base text-white truncate">${track.title}</h4>
                        <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-black">DEMO RECORDING</p>
                    </div>
                    <div class="text-zinc-500 font-mono text-xs pl-2">${track.duration}</div>
                </div>
            `).join('');
        }

        function selectTrack(index, shouldPlay) {
            document.querySelectorAll('[id^="track-item-"]').forEach(el => el.classList.remove('active-track'));
            const currentItem = document.getElementById(`track-item-${index}`);
            
            if (currentItem) {
                currentItem.classList.add('active-track');
                currentItem.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            currentTrackIndex = index;
            audio.src = tracks[index].url;
            audio.load();
            updateProgress(0);
            if (shouldPlay) playAudio();
        }

        function playAudio() {
            audio.play().then(() => { isPlaying = true; updatePlayPauseUI(); }).catch(() => {});
        }

        function updatePlayPauseUI() {
            document.getElementById('play-icon').classList.toggle('hidden', isPlaying);
            document.getElementById('pause-icon').classList.toggle('hidden', !isPlaying);
        }

        function updateAutoplayUI() {
            btnAutoplay.classList.toggle('autoplay-active', autoplay);
        }

        function updateProgress(percent) {
            const safePercent = Math.min(100, Math.max(0, percent));
            fill.style.width = `${safePercent}%`;
            thumb.style.left = `${safePercent}%`;
        }

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function handleSeek(e) {
            const rect = container.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const x = clientX - rect.left;
            let percent = (x / rect.width) * 100;
            percent = Math.min(100, Math.max(0, percent));
            
            updateProgress(percent);
            const time = (percent / 100) * audio.duration;
            document.getElementById('time-current').innerText = formatTime(time);
            
            if (!isDragging) {
                audio.currentTime = time;
            }
        }

        function setupEventListeners() {
            btnPlayPause.onclick = () => { if (isPlaying) audio.pause(); else playAudio(); };
            audio.onpause = () => { isPlaying = false; updatePlayPauseUI(); };
            
            document.getElementById('btn-next').onclick = () => selectTrack((currentTrackIndex + 1) % tracks.length, true);
            document.getElementById('btn-prev').onclick = () => selectTrack((currentTrackIndex - 1 + tracks.length) % tracks.length, true);
            btnAutoplay.onclick = () => { autoplay = !autoplay; updateAutoplayUI(); };

            audio.onloadedmetadata = () => {
                document.getElementById('time-total').innerText = formatTime(audio.duration);
            };
            
            audio.ontimeupdate = () => {
                if (isDragging) return;
                const percent = (audio.currentTime / audio.duration) * 100;
                updateProgress(percent);
                document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            };

            audio.onended = () => { if (autoplay) document.getElementById('btn-next').click(); };

            const startSeek = (e) => {
                isDragging = true;
                handleSeek(e);
                window.addEventListener('mousemove', moveSeek);
                window.addEventListener('mouseup', endSeek);
                window.addEventListener('touchmove', moveSeek, { passive: false });
                window.addEventListener('touchend', endSeek);
            };

            const moveSeek = (e) => {
                if (e.cancelable) e.preventDefault();
                handleSeek(e);
            };

            const endSeek = (e) => {
                if (isDragging) {
                    const rect = container.getBoundingClientRect();
                    const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
                    const lastX = clientX - rect.left;
                    let percent = (lastX / rect.width) * 100;
                    percent = Math.min(100, Math.max(0, percent));
                    
                    audio.currentTime = (percent / 100) * audio.duration;
                    isDragging = false;
                }
                window.removeEventListener('mousemove', moveSeek);
                window.removeEventListener('mouseup', endSeek);
                window.removeEventListener('touchmove', moveSeek);
                window.removeEventListener('touchend', endSeek);
            };

            container.addEventListener('mousedown', startSeek);
            container.addEventListener('touchstart', startSeek, { passive: false });
        }

        window.onload = init;
    </script>
</body>
</html>
