<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The RevV - Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Tighter range input for visibility */
        input[type='range'] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%;
            height: 24px;
            cursor: pointer;
            margin: 0;
            display: block;
            z-index: 30;
        }
        
        /* The invisible track - visible enough to see the path */
        input[type='range']::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: #27272a;
            border-radius: 2px;
        }

        /* The Dot (Thumb) - Larger for mobile touch */
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #ffffff;
            margin-top: -7px; /* Centers thumb on 4px track */
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
            border: none;
        }

        /* The progress fill logic */
        input[type='range'].progress-fill {
            background: linear-gradient(to right, 
                #ffffff 0%, 
                #ffffff var(--progress, 0%), 
                transparent var(--progress, 0%), 
                transparent 100%);
            border-radius: 2px;
            height: 4px;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 0;
            pointer-events: none; /* Let clicks pass through to the input */
        }

        .track-item:nth-child(even) {
            background-color: #111111;
        }

        .active-track {
            background-color: #001f3f !important;
            border-left: 4px solid #ffffff;
        }
        
        .glass-footer {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px);
            border-top: 1px solid #18181b;
        }

        .autoplay-active {
            color: #ffffff !important;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.6));
        }
    </style>
</head>
<body class="bg-black text-white font-sans antialiased overflow-hidden h-screen">

    <div id="app" class="h-full flex flex-col relative max-w-4xl mx-auto">
        
        <!-- Tightened Header -->
        <header class="pt-4 pb-2 px-6 shrink-0">
            <h1 class="text-3xl font-black tracking-tighter text-white italic uppercase">RevV Radio</h1>
        </header>

        <!-- Scrollable Content -->
        <main class="flex-1 overflow-y-auto px-4 no-scrollbar">
            <div id="track-list" class="space-y-0 shadow-2xl rounded-lg overflow-hidden border border-zinc-900 mb-2">
                <!-- Tracks injected here -->
            </div>
        </main>

        <!-- Taller, Tighter Footer Player -->
        <footer class="shrink-0 glass-footer w-full">
            <div class="max-w-4xl mx-auto px-4 pt-4 pb-8 flex flex-col items-center gap-4">
                
                <!-- Controls Row -->
                <div class="flex items-center justify-between w-full px-2">
                    <div class="w-10"></div>

                    <div class="flex items-center space-x-10">
                        <button id="btn-prev" class="text-zinc-500 hover:text-white transition active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="m11 19-7-7 7-7v14zm8 0-7-7 7-7v14z"/></svg>
                        </button>
                        
                        <button id="btn-play-pause" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 transition active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                            <div id="play-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                            <div id="pause-icon" class="hidden">
                                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                            </div>
                        </button>

                        <button id="btn-next" class="text-zinc-500 hover:text-white transition active:scale-90">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="m5 19 7-7-7-7v14zm8 0 7-7-7-7v14z"/></svg>
                        </button>
                    </div>

                    <button id="btn-autoplay" class="transition-all duration-200 flex flex-col items-center group text-zinc-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m17 2 4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                        <span class="text-[7px] uppercase tracking-tighter mt-1 font-black">AUTO</span>
                    </button>
                </div>

                <!-- Seeker Row - Cleaned up spacing -->
                <div class="w-full flex items-center space-x-3">
                    <span id="time-current" class="text-[10px] text-zinc-500 w-8 text-right font-mono">0:00</span>
                    <div class="flex-1 relative h-6 flex items-center">
                        <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.01" class="progress-fill w-full" style="--progress: 0%;">
                    </div>
                    <span id="time-total" class="text-[10px] text-zinc-500 w-8 font-mono">0:00</span>
                </div>

            </div>
        </footer>

        <audio id="main-audio" preload="auto"></audio>
    </div>

    <script>
        const tracks = [
            { id: 0, title: "Voodoo Riff (Draft)", duration: "3:42", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://images.unsplash.com/photo-1514525253361-bee8718a300c?w=200" },
            { id: 1, title: "Crimson Sky", duration: "4:05", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=200" },
            { id: 2, title: "Neon Jungle", duration: "3:18", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=200" },
            { id: 3, title: "Bass Line Idea #4", duration: "2:55", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3", cover: "https://images.unsplash.com/photo-1459749411177-042180ce673c?w=200" },
            { id: 4, title: "After Hours", duration: "5:21", url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3", cover: "https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=200" }
        ];

        let currentTrackIndex = 0;
        let isPlaying = false;
        let autoplay = true;
        let isDragging = false;

        const audio = document.getElementById('main-audio');
        const seekBar = document.getElementById('seek-bar');
        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnAutoplay = document.getElementById('btn-autoplay');

        function forceResetUI() {
            seekBar.value = 0;
            seekBar.setAttribute('value', '0');
            seekBar.style.setProperty('--progress', '0%');
            document.getElementById('time-current').innerText = "0:00";
        }

        function init() {
            renderTrackList();
            setupEventListeners();
            updateAutoplayUI();
            forceResetUI();
            selectTrack(0, false);
        }

        function renderTrackList() {
            document.getElementById('track-list').innerHTML = tracks.map((track, index) => `
                <div id="track-item-${index}" onclick="selectTrack(${index}, true)" class="track-item flex items-center p-4 cursor-pointer transition-all group border-b border-zinc-900 last:border-b-0">
                    <img src="${track.cover}" class="w-12 h-12 rounded object-cover mr-4 border border-white/5">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-base text-white truncate">${track.title}</h4>
                        <p class="text-[9px] text-zinc-500 uppercase tracking-widest font-black">DEMO RECORDING</p>
                    </div>
                    <div class="text-zinc-500 font-mono text-xs pl-2">
                        ${track.duration}
                    </div>
                </div>
            `).join('');
        }

        function selectTrack(index, shouldPlay) {
            document.querySelectorAll('[id^="track-item-"]').forEach(el => el.classList.remove('active-track'));
            const currentItem = document.getElementById(`track-item-${index}`);
            if (currentItem) currentItem.classList.add('active-track');

            currentTrackIndex = index;
            audio.pause();
            audio.src = tracks[index].url;
            audio.load();
            
            forceResetUI();
            audio.currentTime = 0;

            if (shouldPlay) playAudio();
        }

        function playAudio() {
            audio.play().then(() => {
                isPlaying = true;
                updatePlayPauseUI();
            }).catch(() => {});
        }

        function updatePlayPauseUI() {
            document.getElementById('play-icon').classList.toggle('hidden', isPlaying);
            document.getElementById('pause-icon').classList.toggle('hidden', !isPlaying);
        }

        function updateAutoplayUI() {
            btnAutoplay.classList.toggle('autoplay-active', autoplay);
        }

        function updateProgressUI(percent) {
            seekBar.value = percent;
            seekBar.style.setProperty('--progress', `${percent}%`);
        }

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function setupEventListeners() {
            btnPlayPause.onclick = () => { if (isPlaying) audio.pause(); else playAudio(); };
            audio.onpause = () => { isPlaying = false; updatePlayPauseUI(); };
            
            document.getElementById('btn-next').onclick = () => selectTrack((currentTrackIndex + 1) % tracks.length, true);
            document.getElementById('btn-prev').onclick = () => selectTrack((currentTrackIndex - 1 + tracks.length) % tracks.length, true);
            btnAutoplay.onclick = () => { autoplay = !autoplay; updateAutoplayUI(); };

            audio.onloadedmetadata = () => {
                document.getElementById('time-total').innerText = formatTime(audio.duration);
                if (!isPlaying && audio.currentTime === 0) {
                    forceResetUI();
                }
            };
            
            audio.ontimeupdate = () => {
                if (isDragging) return;
                const percent = (audio.currentTime / audio.duration) * 100;
                updateProgressUI(percent);
                document.getElementById('time-current').innerText = formatTime(audio.currentTime);
            };

            audio.onended = () => { if (autoplay) document.getElementById('btn-next').click(); };

            seekBar.onmousedown = () => isDragging = true;
            seekBar.ontouchstart = () => isDragging = true;
            
            seekBar.oninput = () => {
                updateProgressUI(seekBar.value);
                const time = (seekBar.value / 100) * audio.duration;
                document.getElementById('time-current').innerText = formatTime(time);
            };

            seekBar.onchange = () => {
                isDragging = false;
                audio.currentTime = (seekBar.value / 100) * audio.duration;
                if (isPlaying) playAudio();
            };
        }

        window.onload = init;
    </script>
</body>
</html>
