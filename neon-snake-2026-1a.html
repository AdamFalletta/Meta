<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Snake</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            touch-action: none;
            user-select: none;
        }

        /* Liquid Display HUD */
        #hud {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 10px;
            letter-spacing: 1px;
            pointer-events: none;
            z-index: 100;
            backdrop-filter: blur(2px);
            margin-bottom: 15px;
            transition: opacity 0.3s ease;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            background: #000;
            border: 4px solid #222;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        #game-container.glow {
            border-color: var(--glow-color, #00f3ff);
            box-shadow: 0 0 40px var(--glow-color, #00f3ff), inset 0 0 20px var(--glow-color, #00f3ff);
        }

        #game-container.burst {
            border-color: #fff;
            box-shadow: 0 0 100px var(--glow-color, #00f3ff), inset 0 0 50px var(--glow-color, #00f3ff);
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 20px;
            text-align: center;
        }

        .neon-text {
            text-shadow: 0 0 10px currentColor;
        }

        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-option.active {
            border-color: #fff;
            transform: scale(1.2);
            box-shadow: 0 0 15px currentColor;
        }

        #controller-overlay {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 160px;
            height: 160px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            z-index: 150;
        }

        .ctrl-btn {
            width: 50px;
            height: 50px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.1s;
            color: rgba(255, 255, 255, 0.15);
            font-size: 1rem;
        }

        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #fff;
            transform: scale(0.9);
        }

        .hidden { display: none !important; }

        .score-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            padding: 4px 0;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="hud" class="hidden">
    <div>SCORE: <span id="current-score" class="text-cyan-400">0</span></div>
    <div>BITES: <span id="bite-display" class="text-white">0/3</span></div>
    <div>SPEED: <span id="current-speed" class="text-yellow-400">1.0x</span></div>
</div>

<div id="game-container">
    <canvas id="snakeCanvas"></canvas>

    <div id="controller-overlay" class="hidden">
        <div></div>
        <div class="ctrl-btn" style="grid-area: 1 / 2" data-dir="UP">▲</div>
        <div></div>
        <div class="ctrl-btn" style="grid-area: 2 / 1" data-dir="LEFT">◀</div>
        <div class="ctrl-btn" style="grid-area: 2 / 2; border: none; font-size: 8px; color: rgba(255,255,255,0.05);">S</div>
        <div class="ctrl-btn" style="grid-area: 2 / 3" data-dir="RIGHT">▶</div>
        <div></div>
        <div class="ctrl-btn" style="grid-area: 3 / 2" data-dir="DOWN">▼</div>
        <div></div>
    </div>

    <div id="menu-overlay" class="overlay">
        <h1 class="text-3xl font-bold mb-4 neon-text text-cyan-400">NEON SNAKE</h1>
        <p class="mb-4 text-[10px] uppercase tracking-widest text-gray-500">Pick Your Glow</p>
        <div class="grid grid-cols-4 gap-4 mb-10">
            <div class="color-option active" style="background: #00f3ff; color: #00f3ff;" data-color="#00f3ff"></div>
            <div class="color-option" style="background: #ff00f7; color: #ff00f7;" data-color="#ff00f7"></div>
            <div class="color-option" style="background: #00ff41; color: #00ff41;" data-color="#00ff41"></div>
            <div class="color-option" style="background: #ffff00; color: #ffff00;" data-color="#ffff00"></div>
            <div class="color-option" style="background: #ff4d00; color: #ff4d00;" data-color="#ff4d00"></div>
            <div class="color-option" style="background: #8a2be2; color: #8a2be2;" data-color="#8a2be2"></div>
            <div class="color-option" style="background: #ff1493; color: #ff1493;" data-color="#ff1493"></div>
            <div class="color-option" style="background: #ffffff; color: #ffffff;" data-color="#ffffff"></div>
        </div>
        <button id="start-btn" class="bg-white text-black px-10 py-3 rounded-full font-bold hover:scale-105 transition-transform uppercase tracking-widest text-xs mb-8">Initiate Loop</button>
        <div id="high-scores" class="w-48">
            <p class="text-center text-gray-600 text-[9px] mb-2 tracking-tighter">PREVIOUS DATA</p>
            <div id="score-list" class="text-[10px]"></div>
        </div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
        <h2 class="text-2xl font-bold mb-2 text-red-500 neon-text">VOID REACHED</h2>
        <p id="final-score-display" class="text-lg mb-6 text-white">Score: 0</p>
        
        <!-- Only shown if high score reached -->
        <div id="high-score-form" class="hidden">
            <p class="text-cyan-400 text-[10px] mb-4 uppercase tracking-widest">NEW HIGH SCORE DETECTED</p>
            <div class="mb-6">
                <input type="text" id="initials" maxlength="3" placeholder="ID" class="bg-black border-b-2 border-gray-800 text-white text-center p-2 w-20 focus:border-cyan-400 outline-none uppercase font-bold text-xl">
            </div>
            <button id="save-btn" class="bg-cyan-500 text-black px-8 py-2 rounded-full font-bold uppercase tracking-wider text-[10px]">Sync High Score</button>
        </div>

        <!-- Shown if no high score -->
        <div id="retry-section" class="hidden">
            <button id="retry-btn" class="bg-white text-black px-8 py-2 rounded-full font-bold uppercase tracking-wider text-[10px]">Re-Initiate</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');
    const menu = document.getElementById('menu-overlay');
    const gameOver = document.getElementById('game-over-overlay');
    const hud = document.getElementById('hud');
    const controller = document.getElementById('controller-overlay');
    const colorOptions = document.querySelectorAll('.color-option');
    const startBtn = document.getElementById('start-btn');
    const saveBtn = document.getElementById('save-btn');
    const retryBtn = document.getElementById('retry-btn');
    
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(freq, type, duration, vol, ramp = true) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        if (ramp) {
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        }
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const playEatSound = () => {
        playSound(880 + (score * 2), 'triangle', 0.15, 0.15);
        setTimeout(() => playSound(1320 + (score * 2), 'triangle', 0.1, 0.1), 50);
    };
    
    const playSpeedSound = () => {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(1760, now + 0.3);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start();
        osc.stop(now + 0.3);
    };

    const playDeathSound = () => {
        playSound(150, 'sawtooth', 0.4, 0.2);
        playSound(75, 'sawtooth', 0.6, 0.2);
    };

    const GRID_SIZE = 20;
    let TILE_COUNT;
    let canvasSize;

    let snake = [];
    let food = { x: 5, y: 5 };
    let velocity = { x: 0, y: 0 };
    let nextVelocity = { x: 0, y: 0 };
    let score = 0;
    let biteCount = 0;
    let snakeColor = '#00f3ff';
    let gameActive = false;
    let lastTime = 0;
    
    const INITIAL_SPEED = 180;
    const MIN_SPEED = 15;
    let currentMoveInterval = INITIAL_SPEED;

    let foodEmoji = '🍎';
    const emojis = [
        '🍎', '💎', '🍬', '⚡', '🔥', '👾', '🍓', '🥑', 
        '🍕', '🍔', '🍟', '🍩', '🍦', '🍒', '🍋', '🍉', 
        '🍄', '🥨', '🌮', '🍣', '🍤', '🧁', '🍭', '🍺',
        '🍹', '🛸', '🛰️', '🚀', '🌌', '⭐', '💿', '🕹️'
    ];

    function resize() {
        canvasSize = Math.min(window.innerWidth * 0.9, 500);
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        TILE_COUNT = Math.floor(canvasSize / GRID_SIZE);
    }

    window.addEventListener('resize', resize);
    resize();

    colorOptions.forEach(opt => {
        opt.addEventListener('click', (e) => {
            e.stopPropagation();
            colorOptions.forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            snakeColor = opt.dataset.color;
            gameContainer.style.setProperty('--glow-color', snakeColor);
        });
    });

    startBtn.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startGame();
    });
    
    saveBtn.addEventListener('click', saveAndRestart);
    retryBtn.addEventListener('click', () => {
        gameOver.classList.add('hidden');
        menu.classList.remove('hidden');
    });

    function handleDirection(dir) {
        if (!gameActive) return;
        switch(dir) {
            case 'UP': if(velocity.y !== 1) nextVelocity = { x: 0, y: -1 }; break;
            case 'DOWN': if(velocity.y !== -1) nextVelocity = { x: 0, y: 1 }; break;
            case 'LEFT': if(velocity.x !== 1) nextVelocity = { x: -1, y: 0 }; break;
            case 'RIGHT': if(velocity.x !== -1) nextVelocity = { x: 1, y: 0 }; break;
        }
    }

    document.querySelectorAll('.ctrl-btn').forEach(btn => {
        if (!btn.dataset.dir) return;
        const trigger = (e) => {
            e.preventDefault();
            handleDirection(btn.dataset.dir);
        };
        btn.addEventListener('touchstart', trigger, { passive: false });
        btn.addEventListener('mousedown', trigger);
    });

    window.addEventListener('keydown', e => {
        const key = e.key.toLowerCase();
        if (key === 'arrowup' || key === 'w') handleDirection('UP');
        if (key === 'arrowdown' || key === 's') handleDirection('DOWN');
        if (key === 'arrowleft' || key === 'a') handleDirection('LEFT');
        if (key === 'arrowright' || key === 'd') handleDirection('RIGHT');
    });

    function getHighScores() {
        return JSON.parse(localStorage.getItem('neonSnakeHighScores')) || [];
    }

    function updateHighScoresList() {
        const scores = getHighScores();
        const container = document.getElementById('score-list');
        container.innerHTML = scores.map((s, i) => `
            <div class="score-row text-gray-400">
                <span>${i + 1}. ${s.name}</span>
                <span class="text-white">${s.score}</span>
            </div>
        `).join('') || '<p class="text-center text-gray-700">No logs found</p>';
    }

    function startGame() {
        menu.classList.add('hidden');
        gameOver.classList.add('hidden');
        hud.classList.remove('hidden');
        controller.classList.remove('hidden');
        gameContainer.classList.add('glow');
        
        snake = [
            { x: 10, y: 10 },
            { x: 10, y: 11 },
            { x: 10, y: 12 }
        ];
        velocity = { x: 0, y: -1 };
        nextVelocity = { x: 0, y: -1 };
        score = 0;
        biteCount = 0;
        currentMoveInterval = INITIAL_SPEED;
        gameActive = true;
        lastTime = performance.now();
        
        spawnFood();
        updateHUD();
        requestAnimationFrame(gameLoop);
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * TILE_COUNT),
            y: Math.floor(Math.random() * TILE_COUNT)
        };
        foodEmoji = emojis[Math.floor(Math.random() * emojis.length)];
        if (snake.some(p => p.x === food.x && p.y === food.y)) spawnFood();
    }

    function updateHUD() {
        document.getElementById('current-score').innerText = score;
        const speedMultiplier = (INITIAL_SPEED / currentMoveInterval).toFixed(2);
        document.getElementById('current-speed').innerText = speedMultiplier + 'x';
        document.getElementById('bite-display').innerText = `${biteCount % 3}/3`;
    }

    function saveAndRestart() {
        const initials = document.getElementById('initials').value.toUpperCase() || '???';
        let scores = getHighScores();
        scores.push({ name: initials, score: score });
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 5);
        localStorage.setItem('neonSnakeHighScores', JSON.stringify(scores));
        
        updateHighScoresList();
        menu.classList.remove('hidden');
        gameOver.classList.add('hidden');
        hud.classList.add('hidden');
        controller.classList.add('hidden');
        gameContainer.classList.remove('glow');
    }

    function gameLoop(timestamp) {
        if (!gameActive) return;

        const deltaTime = timestamp - lastTime;
        if (deltaTime > currentMoveInterval) {
            lastTime = timestamp;
            update();
        }
        draw();
        requestAnimationFrame(gameLoop);
    }

    function update() {
        velocity = { ...nextVelocity };
        const head = { x: snake[0].x + velocity.x, y: snake[0].y + velocity.y };

        if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT ||
            snake.some(p => p.x === head.x && p.y === head.y)) {
            playDeathSound();
            endGame();
            return;
        }

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score += 10;
            biteCount++;
            
            playEatSound();
            gameContainer.classList.add('burst');
            setTimeout(() => gameContainer.classList.remove('burst'), 250);
            
            if (biteCount % 3 === 0) {
                const level = Math.floor(biteCount / 3);
                const targetMultiplier = 1.0 + (level * 0.25);
                currentMoveInterval = Math.max(MIN_SPEED, INITIAL_SPEED / targetMultiplier);
                playSpeedSound();
            }
            
            updateHUD();
            spawnFood();
        } else {
            snake.pop();
        }
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = '#080808';
        ctx.lineWidth = 1;
        for(let i=0; i<=TILE_COUNT; i++) {
            ctx.beginPath();
            ctx.moveTo(i * GRID_SIZE, 0); ctx.lineTo(i * GRID_SIZE, canvas.height); ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * GRID_SIZE); ctx.lineTo(canvas.width, i * GRID_SIZE); ctx.stroke();
        }

        ctx.font = `${GRID_SIZE - 4}px serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(foodEmoji, food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2);

        ctx.shadowBlur = 15;
        ctx.shadowColor = snakeColor;
        ctx.fillStyle = snakeColor;
        snake.forEach((p, i) => {
            const size = i === 0 ? GRID_SIZE - 2 : GRID_SIZE - 6;
            const offset = (GRID_SIZE - size) / 2;
            ctx.fillRect(p.x * GRID_SIZE + offset, p.y * GRID_SIZE + offset, size, size);
        });
        ctx.shadowBlur = 0;
    }

    function endGame() {
        gameActive = false;
        document.getElementById('final-score-display').innerText = `Score: ${score}`;
        
        const scores = getHighScores();
        const isHighScore = scores.length < 5 || score > scores[scores.length - 1].score;

        document.getElementById('high-score-form').classList.toggle('hidden', !isHighScore);
        document.getElementById('retry-section').classList.toggle('hidden', isHighScore);

        gameOver.classList.remove('hidden');
        hud.classList.add('hidden');
        controller.classList.add('hidden');
        gameContainer.classList.remove('burst');
    }

    updateHighScoresList();
</script>

</body>
</html>
