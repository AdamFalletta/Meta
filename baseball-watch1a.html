<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Dynasty - Gold Pinstripe Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <canvas id="watchCanvas"></canvas>

    <script>
        const canvas = document.getElementById('watchCanvas');
        const ctx = canvas.getContext('2d');

        let width, height, radius, dpr;

        const YANKEES_NAVY = '#001C43';
        const METALLIC_NAVY = '#002855';
        const GOLD_GRADIENT_START = '#D4AF37'; // Metallic Gold
        const GOLD_GRADIENT_MID = '#FFFACD';
        const GOLD_GRADIENT_END = '#8B6508';

        const gameData = {
            jerseyNumber: 99,
            outs: 1, 
            pitchCount: 84,
            homeScore: 13,
            awayScore: 4,
            balls: 3,
            strikes: 2
        };

        function init() {
            resize();
            requestAnimationFrame(animate);
        }

        function resize() {
            dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            radius = Math.min(width, height) * 0.33; 
        }

        function createGoldGradient(x1, y1, x2, y2) {
            const grad = ctx.createLinearGradient(x1, y1, x2, y2);
            grad.addColorStop(0, GOLD_GRADIENT_END);
            grad.addColorStop(0.3, GOLD_GRADIENT_MID);
            grad.addColorStop(0.5, GOLD_GRADIENT_START);
            grad.addColorStop(0.7, GOLD_GRADIENT_MID);
            grad.addColorStop(1, GOLD_GRADIENT_END);
            return grad;
        }

        function drawBaseball(x, y, size) {
            ctx.save();
            ctx.translate(x, y);
            ctx.beginPath();
            ctx.arc(0, 0, size, 0, Math.PI * 2);
            ctx.fillStyle = '#EEE';
            ctx.fill();
            ctx.strokeStyle = '#CCC';
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.strokeStyle = '#FF2222';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(-size * 1.2, 0, size, -Math.PI/4, Math.PI/4);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(size * 1.2, 0, size, Math.PI*0.75, Math.PI*1.25);
            ctx.stroke();
            ctx.restore();
        }

        function drawStrongCase() {
            const cx = width / 2;
            const cy = height / 2;
            
            const drawLink = (y, w, h) => {
                const grad = ctx.createLinearGradient(cx - w/2, 0, cx + w/2, 0);
                grad.addColorStop(0, '#111'); grad.addColorStop(0.5, '#AAA'); grad.addColorStop(1, '#111');
                ctx.fillStyle = grad;
                ctx.beginPath(); ctx.roundRect(cx - w/2, y, w, h, 6); ctx.fill();
                const pGrad = ctx.createLinearGradient(cx - w*0.15, 0, cx + w*0.15, 0);
                pGrad.addColorStop(0, '#333'); pGrad.addColorStop(0.5, '#FFF'); pGrad.addColorStop(1, '#333');
                ctx.fillStyle = pGrad;
                ctx.fillRect(cx - w*0.18, y, w*0.36, h);
            };

            for(let i=0; i<3; i++) {
                drawLink(cy - radius*1.4 - i*radius*0.45, radius*1.1, radius*0.44);
                drawLink(cy + radius*1.3 + i*radius*0.45 - radius*0.44, radius*1.1, radius*0.44);
            }

            const caseGrad = ctx.createLinearGradient(cx - radius*1.3, 0, cx + radius*1.3, 0);
            caseGrad.addColorStop(0, '#050505'); caseGrad.addColorStop(0.5, '#999'); caseGrad.addColorStop(1, '#050505');
            ctx.fillStyle = caseGrad;
            ctx.beginPath();
            ctx.moveTo(cx - radius*1.1, cy - radius*1.4); ctx.lineTo(cx + radius*1.1, cy - radius*1.4);
            ctx.lineTo(cx + radius*1.3, cy); ctx.lineTo(cx - radius*1.3, cy);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(cx - radius*1.1, cy + radius*1.4); ctx.lineTo(cx + radius*1.1, cy + radius*1.4);
            ctx.lineTo(cx + radius*1.3, cy); ctx.lineTo(cx - radius*1.3, cy);
            ctx.fill();
            ctx.beginPath(); ctx.arc(cx, cy, radius * 1.35, 0, Math.PI * 2); ctx.fill();

            const drawGroovedPusher = (x, y, rW, rH, isCrown) => {
                ctx.save(); ctx.translate(x, y);
                const pGrad = ctx.createLinearGradient(0, -rH/2, 0, rH/2);
                pGrad.addColorStop(0, '#111'); pGrad.addColorStop(0.5, '#DDD'); pGrad.addColorStop(1, '#111');
                ctx.fillStyle = pGrad;
                ctx.beginPath(); ctx.roundRect(0, -rH/2, rW, rH, 4); ctx.fill();
                ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 1.5;
                const step = isCrown ? 3 : 5;
                for(let i=3; i<rW-3; i+=step) {
                    ctx.beginPath(); ctx.moveTo(i, -rH/2 + 2); ctx.lineTo(i, rH/2 - 2); ctx.stroke();
                }
                ctx.restore();
            };
            drawGroovedPusher(cx + radius*1.28, cy, radius*0.18, radius*0.35, true); 
            drawGroovedPusher(cx + radius*1.18, cy - radius*0.65, radius*0.15, radius*0.22, false); 
            drawGroovedPusher(cx + radius*1.18, cy + radius*0.65, radius*0.15, radius*0.22, false); 
        }

        function drawBezel() {
            const cx = width / 2, cy = height / 2;
            const bezelOuterR = radius * 1.25;

            const steel = ctx.createRadialGradient(cx, cy, radius*1.15, cx, cy, bezelOuterR);
            steel.addColorStop(0, '#444'); steel.addColorStop(0.5, '#DDD'); steel.addColorStop(1, '#444');
            ctx.fillStyle = steel;
            ctx.beginPath(); ctx.arc(cx, cy, bezelOuterR, 0, Math.PI * 2); ctx.fill();

            const navyGrad = ctx.createRadialGradient(cx, cy, radius * 1.05, cx, cy, radius * 1.22);
            navyGrad.addColorStop(0, '#001026');
            navyGrad.addColorStop(0.5, METALLIC_NAVY);
            navyGrad.addColorStop(1, '#001026');
            ctx.fillStyle = navyGrad;
            ctx.beginPath(); ctx.arc(cx, cy, radius * 1.22, 0, Math.PI * 2); ctx.fill();

            const rehaut = ctx.createRadialGradient(cx, cy, radius, cx, cy, radius * 1.05);
            rehaut.addColorStop(0, '#223344'); 
            rehaut.addColorStop(0.5, '#667788');
            rehaut.addColorStop(0.8, '#99AABB');
            rehaut.addColorStop(1, '#112233');
            ctx.fillStyle = rehaut;
            ctx.beginPath(); ctx.arc(cx, cy, radius * 1.05, 0, Math.PI * 2); ctx.fill();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#FFF';
            for (let i = 0; i < 100; i++) {
                ctx.save();
                ctx.rotate(i * 3.6 * Math.PI / 180);
                if (i % 10 === 0) {
                    ctx.font = `bold ${radius * 0.11}px sans-serif`;
                    let val = i === 0 ? 100 : i;
                    // Adjusted Y offset to ensure centering within the blue ring
                    ctx.fillText(val, 0, -radius * 1.135);
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, -radius * 1.21);
                    ctx.lineTo(0, -radius * 1.18);
                    ctx.stroke();
                }
                ctx.restore();
            }
            ctx.restore();
        }

        function drawSubDial(x, y, r, label, bigVal, smallVal, maxBig = 10, maxSmall = 4) {
            ctx.save();
            ctx.translate(x, y);

            const bgGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
            bgGrad.addColorStop(0, '#002c66');
            bgGrad.addColorStop(1, '#00112b');
            ctx.fillStyle = bgGrad;
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
            
            const borderGrad = ctx.createLinearGradient(-r, -r, r, r);
            borderGrad.addColorStop(0, '#AAA');
            borderGrad.addColorStop(0.5, '#FFF');
            borderGrad.addColorStop(1, '#AAA');
            ctx.strokeStyle = borderGrad;
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = `bold ${r * 0.22}px sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            for(let i=0; i<maxBig; i++) {
                ctx.save();
                const ang = i * (Math.PI*2/maxBig);
                ctx.rotate(ang);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(0, -r+2); ctx.lineTo(0, -r+8); ctx.stroke();
                ctx.translate(0, -r + 18); ctx.rotate(-ang);
                if (i % 2 === 0 || maxBig < 6) ctx.fillText(i, 0, 0);
                ctx.restore();
            }

            // SNAP TO SOLID NUMBERS
            ctx.save(); ctx.rotate((Math.round(smallVal) / maxSmall) * Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r*0.4); ctx.stroke();
            ctx.restore();
            
            ctx.save(); ctx.rotate((Math.round(bigVal) / maxBig) * Math.PI * 2);
            ctx.strokeStyle = '#FFF'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -r*0.75); ctx.stroke();
            ctx.restore();

            ctx.fillStyle = '#AAA'; ctx.font = `bold ${radius * 0.045}px sans-serif`;
            ctx.fillText(label, 0, r * 0.55);
            ctx.restore();
        }

        function drawDiamondMarker(x, y, size) {
            ctx.save();
            ctx.translate(x, y); ctx.rotate(Math.PI / 4);
            ctx.fillStyle = '#555'; ctx.fillRect(-size, -size, size*2, size*2);
            ctx.fillStyle = '#FFF'; ctx.fillRect(-size*0.8, -size*0.8, size*1.6, size*1.6);
            ctx.restore();
        }

        function drawDial() {
            const cx = width / 2, cy = height / 2;
            
            ctx.save();
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI * 2); ctx.clip();
            ctx.fillStyle = YANKEES_NAVY;
            ctx.fillRect(cx - radius, cy - radius, radius*2, radius*2);
            
            ctx.strokeStyle = 'rgba(255,255,255,0.06)';
            ctx.lineWidth = 1.2;
            for(let i = -radius; i < radius; i += 12) {
                ctx.beginPath(); ctx.moveTo(cx + i, cy - radius); ctx.lineTo(cx + i, cy + radius); ctx.stroke();
            }

            const vignette = ctx.createRadialGradient(cx, cy, radius * 0.5, cx, cy, radius);
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = vignette;
            ctx.fillRect(cx - radius, cy - radius, radius * 2, radius * 2);
            ctx.restore();

            drawBaseball(cx, cy - radius * 0.52, radius * 0.08);
            ctx.textAlign = 'center'; ctx.fillStyle = '#FFF';
            ctx.font = `bold ${radius * 0.11}px sans-serif`;
            ctx.fillText("ROLEX", cx, cy - radius * 0.35);
            ctx.font = `bold ${radius * 0.035}px sans-serif`;
            ctx.fillText("OYSTER PERPETUAL", cx, cy - radius * 0.28);
            ctx.fillText("CHRONOGRAPH", cx, cy - radius * 0.23);
            
            // DYNASTY IN GOLD
            ctx.save();
            const goldTextGrad = createGoldGradient(cx - radius*0.2, cy + radius*0.08, cx + radius*0.2, cy + radius*0.16);
            ctx.fillStyle = goldTextGrad;
            ctx.font = `bold ${radius * 0.06}px sans-serif`;
            ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
            ctx.fillText("DYNASTY", cx, cy + radius * 0.12);
            ctx.restore();

            const subR = radius * 0.29;
            const subShiftY = radius * 0.05;
            drawSubDial(cx - radius * 0.48, cy + subShiftY, subR, "AWAY", gameData.awayScore % 10, Math.floor(gameData.awayScore/10));
            drawSubDial(cx + radius * 0.48, cy + subShiftY, subR, "HOME", gameData.homeScore % 10, Math.floor(gameData.homeScore/10));
            drawSubDial(cx, cy + radius * 0.5, subR, "COUNT", gameData.balls, gameData.strikes, 4, 3);

            // Slightly smaller diamond markers
            drawDiamondMarker(cx, cy - radius * 0.88, radius * 0.055); // 12
            drawDiamondMarker(cx - radius * 0.88, cy, radius * 0.055); // 9

            for (let i = 1; i <= 12; i++) {
                if (i === 12 || i === 9 || i === 3 || i === 6) continue;
                const ang = i * 30 * Math.PI / 180;
                const rPos = radius * 0.88;
                ctx.save();
                ctx.translate(cx + Math.sin(ang)*rPos, cy - Math.cos(ang)*rPos);
                ctx.rotate(ang);
                ctx.fillStyle = '#555'; ctx.beginPath(); ctx.roundRect(-radius*0.025, -radius*0.08, radius*0.05, radius*0.16, 2); ctx.fill();
                ctx.fillStyle = '#FFF'; ctx.beginPath(); ctx.roundRect(-radius*0.018, -radius*0.07, radius*0.036, radius*0.14, 2); ctx.fill();
                ctx.restore();
            }

            // Home Plate at 6
            ctx.save();
            ctx.translate(cx, cy + radius*0.9);
            const drawPlate = (size, col) => {
                ctx.fillStyle = col; ctx.beginPath();
                ctx.moveTo(-size, -size*0.6); ctx.lineTo(size, -size*0.6);
                ctx.lineTo(size, size*0.3); ctx.lineTo(0, size); ctx.lineTo(-size, size*0.3);
                ctx.fill();
            };
            drawPlate(radius*0.08, '#555'); drawPlate(radius*0.065, '#FFF');
            ctx.restore();
        }

        function drawJerseyWindow() {
            const cx = width / 2, cy = height / 2;
            const x = cx + radius * 0.9, y = cy; 
            const w = radius * 0.1, h = radius * 0.08; 
            
            ctx.fillStyle = '#ededed';
            ctx.beginPath(); ctx.roundRect(x - w/2, y - h/2, w, h, 2); ctx.fill();
            
            ctx.fillStyle = '#000'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.font = `bold ${radius * 0.07}px sans-serif`;
            ctx.fillText(gameData.jerseyNumber, x, y);
            
            const lensGrad = ctx.createLinearGradient(x-10, y-10, x+10, y+10);
            lensGrad.addColorStop(0, 'rgba(255,255,255,0.2)');
            lensGrad.addColorStop(1, 'rgba(255,255,255,0.02)');
            ctx.fillStyle = lensGrad;
            ctx.beginPath(); ctx.roundRect(x - radius*0.08, y - radius*0.07, radius * 0.16, radius * 0.14, 12); ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; ctx.stroke();
        }

        function drawHands() {
            const cx = width / 2, cy = height / 2;
            const hAng = (7 * 30 + 10 * 0.5) * Math.PI / 180;
            const outAng = (gameData.outs * 60) * Math.PI / 180;
            const pAng = (gameData.pitchCount * 3.6) * Math.PI / 180;

            const drawHand = (ang, len, w) => {
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(ang);
                ctx.fillStyle = '#AAA';
                ctx.beginPath(); ctx.roundRect(-w/2, 15, w, -len, 4); ctx.fill();
                ctx.fillStyle = YANKEES_NAVY; 
                ctx.fillRect(-w*0.1, 10, w*0.2, -len + 20);
                ctx.fillStyle = '#FFF'; 
                ctx.fillRect(-w/2 + 1, -len+5, w-2, 15);
                ctx.restore();
            };

            drawHand(hAng, radius * 0.55, 12);
            drawHand(outAng, radius * 0.85, 8);

            // GOLD SWEEP HAND WITH SHINE
            ctx.save(); ctx.translate(cx, cy); ctx.rotate(pAng);
            const goldHandGrad = createGoldGradient(0, 30, 0, -radius * 1.15);
            ctx.strokeStyle = goldHandGrad; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, 30); ctx.lineTo(0, -radius * 1.15); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 25, 4, 0, Math.PI * 2); ctx.fillStyle = goldHandGrad; ctx.fill();
            ctx.restore();

            ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI * 2); ctx.fillStyle = '#AAA'; ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
            drawStrongCase(); drawBezel(); drawDial(); drawJerseyWindow(); drawHands();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        window.onload = init;
    </script>
</body>
</html>
